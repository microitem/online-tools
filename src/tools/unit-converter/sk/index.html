<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prevodník jednotiek dĺžky | GoodBoog.info</title>
    <link href="/styles/output.css" rel="stylesheet">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Online prevodník jednotiek dĺžky - jednoducho prevádzajte medzi metrami, kilometrami, centimetrami a milimetrami. Rýchly a presný prevod jednotiek zadarmo.">
    <meta name="keywords" content="prevodník jednotiek, prevod jednotiek dĺžky, meter na kilometer, centimetre na metre, online kalkulačka">
    <meta name="author" content="GoodBoog.info">
    
    <!-- Language Alternates -->
    <link rel="alternate" hreflang="en" href="https://goodboog.info/tools/unit-converter/">
    <link rel="alternate" hreflang="sk" href="https://goodboog.info/tools/unit-converter/sk/">
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow-sm">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center mb-4">
                <a href="/sk/" class="text-blue-600 hover:text-blue-800">← Späť na hlavnú stránku</a>
                <div class="language-switcher">
                    <a href="../" class="text-sm text-gray-600 hover:text-gray-900">English</a>
                    <span class="mx-2 text-gray-400">|</span>
                    <a href="." class="text-sm text-gray-600 hover:text-gray-900 font-bold">Slovensky</a>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Prevodník jednotiek dĺžky</h1>
        </nav>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-xl mx-auto bg-white rounded-lg shadow p-6">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="value">
                    Hodnota:
                </label>
                <input type="number" id="value" class="w-full p-2 border rounded" value="1">
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="fromUnit">
                        Z jednotky:
                    </label>
                    <select id="fromUnit" class="w-full p-2 border rounded">
                        <option value="m">Metre (m)</option>
                        <option value="km">Kilometre (km)</option>
                        <option value="cm">Centimetre (cm)</option>
                        <option value="mm">Milimetre (mm)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="toUnit">
                        Na jednotku:
                    </label>
                    <select id="toUnit" class="w-full p-2 border rounded">
                        <option value="cm">Centimetre (cm)</option>
                        <option value="m">Metre (m)</option>
                        <option value="km">Kilometre (km)</option>
                        <option value="mm">Milimetre (mm)</option>
                    </select>
                </div>
            </div>

            <div class="bg-gray-100 p-4 rounded">
                <p class="text-center text-lg">
                    Výsledok: <span id="result" class="font-bold">100</span> <span id="resultUnit">cm</span>
                </p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white mt-8">
        <div class="container mx-auto px-4 py-6 text-center">
            <p>&copy; 2024 GoodBoog.info. Všetky práva vyhradené.</p>
        </div>
    </footer>

    <script>
        function convert() {
            const value = parseFloat(document.getElementById('value').value);
            const fromUnit = document.getElementById('fromUnit').value;
            const toUnit = document.getElementById('toUnit').value;
            
            let meters;
            switch(fromUnit) {
                case 'km': meters = value * 1000; break;
                case 'm': meters = value; break;
                case 'cm': meters = value / 100; break;
                case 'mm': meters = value / 1000; break;
            }
            
            let result;
            switch(toUnit) {
                case 'km': result = meters / 1000; break;
                case 'm': result = meters; break;
                case 'cm': result = meters * 100; break;
                case 'mm': result = meters * 1000; break;
            }
            
            document.getElementById('result').textContent = result.toFixed(2);
            document.getElementById('resultUnit').textContent = toUnit;
        }

        document.getElementById('value').addEventListener('input', convert);
        document.getElementById('fromUnit').addEventListener('change', convert);
        document.getElementById('toUnit').addEventListener('change', convert);
        
        convert();
    </script>
</body>
</html>
