name: Deploy to Production

on:
 push:
   branches: [ main ]
 workflow_dispatch:

jobs:
 deploy:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     
     - name: Setup SSH
       uses: webfactory/ssh-agent@v0.8.0
       with:
         ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
         
     - name: Add known hosts
       run: |
         mkdir -p ~/.ssh
         echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts
         
     - name: Replace paths and domains
       run: |
         # Hlavná doména a jazykové verzie
         find ./src -type f -name "*.html" -exec sed -i 's|/srv/docker/goodboog.com/src/public/|https://goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/online-tools/src/public/|https://goodboog.com/|g' {} +
         
         # Prepínače jazykov pre hlavnú doménu
         find ./src -type f -name "*.html" -exec sed -i 's|href="/sk/|href="https://goodboog.com/sk/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|href="/en/|href="https://goodboog.com/en/|g' {} +
         
         # Prepínače jazykov pre nástroje
         find ./src -type f -name "*.html" -exec sed -i 's|href="converter/sk/|href="https://converter.goodboog.com/sk/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|href="calculator/sk/|href="https://calculator.goodboog.com/sk/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|href="qrcode/sk/|href="https://qrcode.goodboog.com/sk/|g' {} +
         
         # Zdieľané zdroje (CSS)
         find ./src -type f -name "*.html" -exec sed -i 's|/shared/styles/|https://goodboog.com/shared/styles/|g' {} +
         
         # Nástroje - priama cesta
         find ./src -type f -name "*.html" -exec sed -i 's|/tools/converter/|https://converter.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/tools/calculator/|https://calculator.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/tools/qrcode/|https://qrcode.goodboog.com/|g' {} +
         
         # Nástroje - cez categories
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/converter/|https://converter.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/calculator/|https://calculator.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/qrcode/|https://qrcode.goodboog.com/|g' {} +
         
         # Kategórie
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/design/|https://design.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/dev/|https://dev.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/education/|https://education.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/finance/|https://finance.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/fun/|https://fun.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/health/|https://health.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/productivity/|https://productivity.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/social/|https://social.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/tools/|https://tools.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|/categories/travel/|https://travel.goodboog.com/|g' {} +
         
     - name: Deploy files to server
       env:
         DEPLOY_PATH: /srv/docker/goodboog.com/src
         DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
         DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
       run: |
         echo "Deploying to path: $DEPLOY_PATH"
         # Najprv vyčistíme cieľový adresár
         ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "rm -rf ${DEPLOY_PATH}/*"
         # Potom kopírujeme len potrebné adresáre zo src priečinka
         rsync -avz src/categories "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         rsync -avz src/public "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         rsync -avz src/shared "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         rsync -avz src/tools "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         # Reštartujeme Docker v správnom adresári
         ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd /srv/docker/goodboog.com && docker compose up -d --build"
