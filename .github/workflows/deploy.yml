name: Deploy to Production

on:
 push:
   branches: [ main ]
 workflow_dispatch:

jobs:
 deploy:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     
     - name: Setup SSH
       uses: webfactory/ssh-agent@v0.8.0
       with:
         ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
         
     - name: Add known hosts
       run: |
         mkdir -p ~/.ssh
         echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts
         
     - name: Replace paths and domains
       run: |
         # Základné cesty pre nástroje
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/tools/converter/|"https://converter.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/tools/calculator/|"https://calculator.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/tools/qrcode/|"https://qrcode.goodboog.com/|g' {} +
         
         # Prepínače jazykov pre nástroje
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/tools/converter/sk/|"https://converter.goodboog.com/sk/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/tools/calculator/sk/|"https://calculator.goodboog.com/sk/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/tools/qrcode/sk/|"https://qrcode.goodboog.com/sk/|g' {} +

         # Prepínače jazykov pre hlavnú doménu
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/public/sk/|"https://goodboog.com/sk/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/public/en/|"https://goodboog.com/en/|g' {} +
         
         # Zdieľané zdroje (CSS)
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/shared/|"https://goodboog.com/shared/|g' {} +

         # Kategórie
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/design/|"https://design.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/dev/|"https://dev.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/education/|"https://education.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/finance/|"https://finance.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/fun/|"https://fun.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/health/|"https://health.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/productivity/|"https://productivity.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/social/|"https://social.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/tools/|"https://tools.goodboog.com/|g' {} +
         find ./src -type f -name "*.html" -exec sed -i 's|"/online-tools/src/categories/travel/|"https://travel.goodboog.com/|g' {} +
         
     - name: Deploy files to server
       env:
         DEPLOY_PATH: /srv/docker/goodboog.com/src
         DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
         DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
       run: |
         echo "Deploying to path: $DEPLOY_PATH"
         # Najprv vyčistíme cieľový adresár
         ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "rm -rf ${DEPLOY_PATH}/*"
         # Potom kopírujeme len potrebné adresáre zo src priečinka
         rsync -avz src/categories "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         rsync -avz src/public "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         rsync -avz src/shared "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         rsync -avz src/tools "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
         # Reštartujeme Docker v správnom adresári
         ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd /srv/docker/goodboog.com && docker compose up -d --build"
